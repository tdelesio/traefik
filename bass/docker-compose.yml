version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bass_lesson_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_secure_db_pass # In production, replace with secure secrets via env files
      POSTGRES_DB: bass_lessons
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bass_lessons"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bass-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: bass_lesson_backend_prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:production_secure_db_pass@db:5432/bass_lessons
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - bass-internal
      - traefik_proxy # Connect to the external Traefik proxy network
    labels:
      - "traefik.enable=true"
      # Route requests starting with /api to the backend. Traefik matches longer/more specific rules first.
      - "traefik.http.routers.bass-backend.rule=Host(`bass.${DOMAINNAME:-delesio.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.bass-backend.entrypoints=websecure"
      - "traefik.http.routers.bass-backend.tls=true"
      - "traefik.http.routers.bass-backend.tls.certresolver=myresolver"
      # Apply the shared security headers middleware defined in the root Traefik container
      - "traefik.http.routers.bass-backend.middlewares=secure-headers@docker"
      - "traefik.http.services.bass-backend.loadbalancer.server.port=3001"
      # Ensure Traefik connects to this container via the shared proxy network
      - "traefik.docker.network=traefik_proxy"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=/api
    container_name: bass_lesson_frontend_prod
    # Note: Removed "ports: - 80:80" to avoid port binding conflicts with the Traefik host ports.
    depends_on:
      - backend
    restart: always
    networks:
      - bass-internal
      - traefik_proxy # Connect to the external Traefik proxy network
    labels:
      - "traefik.enable=true"
      # Route all other web traffic to the frontend
      - "traefik.http.routers.bass-frontend.rule=Host(`bass.${DOMAINNAME:-delesio.com}`)"
      - "traefik.http.routers.bass-frontend.entrypoints=websecure"
      - "traefik.http.routers.bass-frontend.tls=true"
      - "traefik.http.routers.bass-frontend.tls.certresolver=myresolver"
      # Apply the shared security headers middleware defined in the root Traefik container
      - "traefik.http.routers.bass-frontend.middlewares=secure-headers@docker"
      - "traefik.http.services.bass-frontend.loadbalancer.server.port=80"
      # Ensure Traefik connects to this container via the shared proxy network
      - "traefik.docker.network=traefik_proxy"

volumes:
  pgdata_prod:

networks:
  # Internal bridge network for secure service-to-service and service-to-db communication
  bass-internal:
    driver: bridge
  # External network used by Traefik (defined in root docker-compose.yml as 'traefik_proxy')
  traefik_proxy:
    external: true
