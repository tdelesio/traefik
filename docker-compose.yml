services:
  traefik:
    image: traefik:v2.10
    container_name: traefik-v2
    restart: always
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true" # Enable the built-in Traefik Web Dashboard
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false" # Security: don't route containers unless explicitly asked
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # 🔄 Automatically redirect standard HTTP (80) to secure HTTPS (443)
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # 🛡️ Let's Encrypt Automatic SSL certificate provisioner
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=tim@delesio.com" # Updated to match your domain
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Listen to local docker socket
      - "./letsencrypt:/letsencrypt"                  # Persist SSL certificates
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAINNAME:-delesio.com}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=myresolver"
      # 🔒 Basic Auth for the Dashboard (User: admin / Password: password)
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$qp37oz7m$$/o92qN.8t59/K9r170tXW."
      
      # 🛡️ Shared Reusable Security Headers Middleware (Referenced by other services as secure-headers@docker)
      - "traefik.http.middlewares.secure-headers.headers.sslRedirect=true"
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.secure-headers.headers.sslHost=${DOMAINNAME:-delesio.com}"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=false"

networks:
  traefik_proxy:
    external: true # Shared external proxy network on host

