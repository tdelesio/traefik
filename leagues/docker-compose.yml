services:
  mysql:
    image: mysql:8.0
    container_name: leagues-mysql-v2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: leagues_mono
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - leagues-network

  redis:
    image: redis:7.0-alpine
    container_name: leagues-redis-v2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - leagues-network

  app:
    image: tdelesio/leagues-app:0.0.2
    container_name: leagues-app-v2
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/leagues_mono?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: dbuser
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leagues-network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.leagues.rule=Host(`leagues.${DOMAINNAME:-delesio.com}`)"
      - "traefik.http.routers.leagues.entrypoints=websecure"
      - "traefik.http.routers.leagues.tls=true"
      - "traefik.http.routers.leagues.tls.certresolver=myresolver"
      - "traefik.http.routers.leagues.middlewares=secure-headers@docker"
      - "traefik.http.services.leagues.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_proxy"

networks:
  leagues-network:
    driver: bridge
  traefik_proxy:
    external: true

volumes:
  mysql-data:

