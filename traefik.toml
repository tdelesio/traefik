defaultEntryPoints = ["http", "https"]

[entryPoints]
  [entryPoints.http]
  address = ":80"
    [entryPoints.http.redirect]
    entryPoint = "https"
  [entryPoints.https]
  address = ":443"
    [entryPoints.https.tls]

[api]
dashboard = true

[docker]
endpoint = "unix:///var/run/docker.sock"
domain = "delesio.com"
watch = true
exposedByDefault = false

[acme]
email = "tim@delesio.com" # 👈 Change to your actual admin email
storage = "acme.json"
entryPoint = "https"
onHostRule = true
[acme.httpChallenge]
entryPoint = "http"
